version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: veterina-postgres
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: VetStationDb
    volumes:
      - veterina-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veterina-net
    restart: unless-stopped

  api:
    image: mirkozec/myapps:veterina-api-latest
    container_name: exam-api
    ports:
      - "5231:5231"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=VetStationDb;User Id=postgres;Password=root;
    networks:
      - veterina-net
    restart: unless-stopped

  frontend:
    image: mirkozec/myapps:veterina-frontend-latest
    container_name: veterina-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - veterina-net
    restart: unless-stopped

  portfolio:
    image: mirkozec/myapps:portfolio-latest
    container_name: my-portfolio
    ports:
      - "3001:3001"
    networks:
      - veterina-net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - veterina-net
    restart: unless-stopped

volumes:
  veterina-data:
    driver: local

networks:
  veterina-net:
    driver: bridge
    name: veterina-net
